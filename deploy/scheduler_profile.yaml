# Cloud Scheduler — profile snapshot job
# Runs every Sunday at 23:00 UTC.
# The job itself gates to a 4-week cadence (checks MAX(snapshot_date) in BQ).
#
# Create:
#   gcloud scheduler jobs create http driftwatch-profile-trigger \
#     --schedule="0 23 * * 0" \
#     --uri="https://us-central1-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/YOUR_PROJECT/jobs/driftwatch-profile:run" \
#     --http-method=POST \
#     --oauth-service-account-email=driftwatch-sa@YOUR_PROJECT.iam.gserviceaccount.com \
#     --location=us-central1 \
#     --time-zone="UTC"
#
# Or use: make scheduler-profile PROJECT=your-gcp-project

schedule: "0 23 * * 0"
timezone: UTC
target:
  type: cloud_run_job
  job_id: driftwatch-profile
  region: us-central1
  command: ["python", "jobs/run_profile.py"]

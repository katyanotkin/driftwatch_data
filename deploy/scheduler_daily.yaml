# Cloud Scheduler — daily OHLCV job
# Runs Mon–Fri at 22:00 UTC (1 hour after US market close at 21:00 UTC)
#
# Create:
#   gcloud scheduler jobs create http driftwatch-daily-trigger \
#     --schedule="0 22 * * 1-5" \
#     --uri="https://us-central1-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/teamfish/jobs/driftwatch-daily:run" \
#     --http-method=POST \
#     --oauth-service-account-email=driftwatch-sa@teamfish.iam.gserviceaccount.com \
#     --location=us-central1 \
#     --time-zone="UTC"
#
# Or use: make scheduler-daily PROJECT=teamfish

schedule: "0 22 * * 1-5"
timezone: UTC
target:
  type: cloud_run_job
  job_id: driftwatch-daily
  region: us-central1
  command: ["python", "jobs/run_daily.py"]
